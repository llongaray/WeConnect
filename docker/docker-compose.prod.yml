# Override produção — fecha portas internas e expõe apenas HTTPS via nginx
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres-app:
    ports: []

  postgres:
    ports: []

  redis:
    ports: []

  evolution-api:
    ports: []

  backend:
    ports: []

  certbot:
    image: certbot/certbot:latest
    container_name: weconnect_certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.admin-allow.conf:/etc/nginx/admin-allow.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro

volumes:
  certbot_www:
